<!-- 8) შექმენით ქვემოთ მოცემული ფოტოს ანალოგი ფორმა გამოიყენეთ flex და ნასწავლი მასალა -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #4eb5d9;
        }
        .parent{
            background: white;
            padding: 40px;
            width: 350px;
            text-align: left;
        }
        h3 {
            color: #4eb5d9;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4eb5d9;
            color: white;
            border: none;
            font-size: 16px;
        }
    </style>
 </head>
 <body>
    <div class="parent">
        <h3>Login To Your Account</h3>
        <form>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button type="submit">Login</button>
        </form>
    </div>
 </body>
 </html>
