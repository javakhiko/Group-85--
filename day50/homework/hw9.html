<!-- 9)კომენტარის სახით ჩამოწერე თუ რა არის flex-wrap და რაში გვეხმარება ის, ასევე ჩამოწერე რა მნიშვენლობები გადაეცემა მას და რომელი მათგანი რაზეა პასუხისმგებელი

მოიყვანე სამივეზე თითო მაგალით -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent {
            display: flex;
            width: 300px;
            border: 2px solid #333;
            margin-bottom: 20px;
        }

        .child {
            width: 120px;
            height: 50px;
            background-color: #4eb5d9;
            border: 1px solid white;
        }
        .example-nowrap {
            flex-wrap: nowrap;
        }
        .example-wrap {
            flex-wrap: wrap;
        }
        .example-reverse {
            flex-wrap: wrap-reverse;
        }
    </style>
</head>
<body>
    <div class="parent example-nowrap">
        <div class="child">1</div>
        <div class="child">2</div>
        <div class="child">3</div>
    </div>

    <div class="parent example-wrap">
        <div class="child">1</div>
        <div class="child">2</div>
        <div class="child">3</div>
    </div>

    <div class="parent example-reverse">
        <div class="child">1</div>
        <div class="child">2</div>
        <div class="child">3</div>
    </div>
</body>
</html>
