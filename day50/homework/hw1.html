<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            display: flex;
            align-items: center;
        }
        .parent1{
            background-color: purple;
            width: 100%;
            height: 250px;
            justify-content: space-between;
        }
        .parent2{
            background-color: purple;
            width: 100%;
            height: 250px;
            justify-content: space-around;
        }
        .parent3{
            background-color: purple;
            width: 100%;
            height: 250px;
            justify-content: space-evenly;
        }
        .child{
            background-color: orange;
            width: 100px;
            height: 100px;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <div class="parent1 parent">
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
    </div>
    <br>
    <div class="parent2 parent">
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
    </div>
    <br>
    <div class="parent3 parent">
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
    </div>
</body>
</html>
