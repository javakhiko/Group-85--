<!-- 10)შექმენით საიტზე შემდეგი თეგები შემდეგი კომბინაციით ==>

<p> .... </p>
<button>...</button>
<h1> ... </h1>


შენი დავალერბაა რომ ღილაკს მისცე დაშორება მხოლოდ ქვემოდან 40px

ასევე მიეცი ბორდერი ყველა მხარეს 8px dotted blue , და მოუმრგვალე კუთხეები 10px ით

ასევე მიეცი დაშორება ბორდერსა და გარე ელემენტებს შორის მხოლოდ ქვემოდან 140px იანი

ასევე p  ს მიეცი გარე დაშორება (margin) მხოლოდ ზემოდან ქვემოდან 100px -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p style="margin-top: 100px; margin-bottom: 100px;"> .... </p>
    <button style="padding-bottom: 40px; border: dotted 8px blue; border-radius: 10px; margin-bottom:140px ;">...</button>
    <h1> ... </h1>
</body>
</html>
