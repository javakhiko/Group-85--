<!-- 6)შექმენი პატარა წრეები (4 ცალი), რომლებიც იქნებიან:

ზედა მარცხენა
ზედა მარჯვენა
ქვედა მარცხენა
ქვედა მარჯვენა

გამოიყენეთ absolute -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent {
            width: 300px;
            height: 300px;
            background-color: lightgray;
            position: relative;
        }

        .circle {
            width: 40px;
            height: 40px;
            background-color: blue;
            border-radius: 50%;
            position: absolute;
        }

        .tl {
            top: 0;
            left: 0;
        }

        .tr {
            top: 0;
            right: 0;
        }

        .bl {
            bottom: 0;
            left: 0;
        }

        .br {
            bottom: 0;
            right: 0;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="circle tl"></div>
        <div class="circle tr"></div>
        <div class="circle bl"></div>
        <div class="circle br"></div>
    </div>
</body>
</html>
