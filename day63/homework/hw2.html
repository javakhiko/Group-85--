<!-- 2)შექმენი ბლოკი (400x250) და:

სურათი იყოს მარცხენა ზედა კუთხეში

იყოს პატარა ზომის(მიეცით ზომა 100px)

ფოტო არ განმეორდეს 

ასევე - გამოიყენე shorthand იც  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box {
            width: 400px;
            height: 250px;
            border: 1px solid black;
            background-image: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");
            background-position: left top;
            background-repeat: no-repeat;
            background-size: 100px;
        }
        .box2 {
            width: 400px;
            height: 250px;
            border: 1px solid black;
            background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") left top / 100px no-repeat;
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <br>
    <div class="box2"></div>
</body>
</html>
