<!-- 
14)შექმენი სურათი:

hover-ზე:
შემცირდეს ზომაში
180deg-ით დატრიალდეს
მარცხნივ გადავიდეს
 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .photo{
            width: 300px;
        }

        .photo:hover{
            transform: scale(0.7) rotate(180deg) translateX(-1000px);
        }
    </style>
</head>
<body>
    <img class="photo" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800" alt="">
</body>
</html>
