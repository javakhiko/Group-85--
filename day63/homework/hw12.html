<!-- 
12)შექმენი წრე:

hover-ზე:
ოდნავ გაიზარდოს
მარჯვნივ და ქვემოთ ერთად გადავიდეს (translate)
ცოტათი დატრიალდეს
 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .circle{
            width: 120px;
            height: 120px;
            background: purple;
            border-radius: 50%;
            }

        .circle:hover{
            transform: scale(1.2) translate(20px, 20px) rotate(15deg);
        }
    </style>
</head>
<body>
    <div class="circle"></div>
</body>
</html>
