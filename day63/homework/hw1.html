<!-- 1)შექმენი div (300x300) და დაუყენე background სურათი ისე, რომ:

იყოს ცენტრში
არ გამეორდეს
ზომა იყოს contain

ბოლოს გადააკეთე ეს ყველაფერი background shorthand-ად -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box {
            width: 300px;
            height: 300px;

            background-image: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
        }
        .box2 {
            width: 300px;
            height: 300px;

            background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") center / contain no-repeat;
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <br>
    <div class="box2"></div>
</body>
</html>
