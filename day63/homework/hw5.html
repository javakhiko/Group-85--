<!-- 5)შექმენი card:

სურათი ცენტრში

არ განმეორდეს

contain იყოს

ბოლოს shorthand იც -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .card {
            width: 300px;
            height: 400px;
            border: 1px solid black;
            background-image: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
        }

        .card2 {
            width: 300px;
            height: 400px;
            border: 1px solid black;
            background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") center / contain no-repeat;
        }
    </style>
</head>
<body>
    <div class="card"></div>
    <br>
    <div class="card2"></div>
</body>
</html>
