<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Snap - Remote Work</title>
</head>
<body>

  <header class="navbar">
    <div class="nav-left">
      <img src="logo.svg" alt="snap" class="logo">
      <nav class="nav-links">
        <div class="dropdown">
          <a href="" class="dropdown-trigger">
            Features <img src="icon-arrow-down.svg" alt="" class="arrow">
          </a>
        </div>

        <div class="dropdown">
          <a href="" class="dropdown-trigger">
            Company <img src="icon-arrow-down.svg" alt="" class="arrow">
          </a>
        </div>

        <a href="">Careers</a>
        <a href="">About</a>
      </nav>
    </div>

    <div class="nav-auth">
      <a href="" class="login">Login</a>
      <a href="" class="register">Register</a>
    </div>
  </header>

  <main class="hero">
    <div class="hero-content">
      <h1>Make remote work</h1>
      <p>Get your team in sync, no matter your location. Streamline processes, create team rituals, and watch productivity soar.</p>
      <button class="cta-btn">Learn more</button>
      
      <div class="client-logos">
        <img src="client-databiz.svg" alt="databiz">
        <img src="client-audiophile.svg" alt="audiophile">
        <img src="client-meet.svg" alt="meet">
        <img src="client-maker.svg" alt="maker">
      </div>
    </div>

    <div class="hero-image">
      <picture>
        <img src="image-hero-desktop.png" alt="Hero Illustration">
      </picture>
    </div>
  </main>

</body>
</html>
