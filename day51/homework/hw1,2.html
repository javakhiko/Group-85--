<!-- 1)კომენტარის სახით ახსენით თუ რაში ვიყენებთ align-self და რა მნიშვნელობები გადაეცემა ამს 

მოიყვანე ორი მაგალითი ამ ფლექსის კუთვნილებასთან დაკავშირებით -->
<!-- ეს სტილი ეწერება მხოლოდ და მხოლოდ იმ ელემენტს რომელსაც 
ჩვენ ვუთითებთ და ეცვლება y ღერძზე პოზიცია  align-self:end; start-->
<!-- 2)გაქვს კონტეინერი (height: 300px).
შიგნით არის 3 div.

ყველა ელემენტი დალაგებულია align-items: center-ით
მაგრამ მეორე div უნდა გადავიდეს ზემოთ (container-ის დასაწყისში)

გამოიყენე მხოლოდ align-self -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            display: flex;
            align-items: center;
            height: 300px;
        }
        .child{
            background: red;
            width: 100px;
            height: 100px;
            align-self: start;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child"></div>
        <div class="child1 child"></div>
        <div class="child"></div>
    </div>
</body>
</html>
