<!-- 14)გაქვს 3 ელემენტი:

ყველას აქვს flex-basis: 250px
container არის 500px

გააკეთე ისე, რომ:

shrink გადანაწილდეს არათანაბრად
ერთი ელემენტი თითქმის უცვლელი დარჩეს -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flex-container {
            display: flex;
            width: 500px;
        }

        .item-1 {
            flex-basis: 250px;
            flex-shrink: 0.1;
        }

        .item-2 {
            flex-basis: 250px;
            flex-shrink: 5;
        }

        .item-3 {
            flex-basis: 250px;
            flex-shrink: 10;
        }
    </style>
</head>
<body>
    <div class="flex-container">
        <div class="item-1">Item 1</div>
        <div class="item-2">Item 2</div>
        <div class="item-3">Item 3</div>
    </div>
</body>
</html>
