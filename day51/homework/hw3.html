<!-- 3)გაქვს flex კონტეინერი (height: 400px) 4 ელემენტით.

მოაწყე ისე, რომ:

პირველი ელემენტი იყოს ქვემოთ
მეორე ელემენტი იყოს ზემოთ
მესამე ელემენტი იყოს ცენტრში
მეოთხე დარჩეს default პოზიციაზე

გამოიყენე align-self თითოეულზე ინდივიდუალურად -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            display: flex;
            align-items: center;
            height: 300px;
            border: 2px solid red;
        }
        .child{
            background: rgb(0, 119, 255);
            width: 100px;
            height: 100px;
        }
        .child1{
            align-self: end;
        }
        .child2{
            align-self: start;
        }
        .child3{
            align-self: center;
        }
        .child4{
            align-self:normal;
        }
    </style>
    </style>
</head>
<body>
    <div class="parent">
        <div class="child child1"></div>
        <div class="child child2"></div>
        <div class="child child3"></div>
        <div class="child child4"></div>
    </div>
</body>
</html>
