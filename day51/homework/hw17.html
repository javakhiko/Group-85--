<!-- 17)გაქვს flex container და 2 ელემენტი.

გააკეთე ისე, რომ:

პირველი ელემენტი: არ გაიზარდოს, არ შემცირდეს, იყოს 200px

მეორე ელემენტი: დაიკავოს დარჩენილი სივრცე -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flex-container {
            display: flex;
        }

        .item-1 {
            flex: 200px;
        }

        .item-2 {
            flex:auto;
        }
    </style>
</head>
<body>
    <div class="flex-container">
        <div class="item-1">Item 1</div>
        <div class="item-2">Item 2</div>
    </div>
</body>
</html>
