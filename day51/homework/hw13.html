<!-- 13)გაქვს flex container პატარა ზომით მაგ 400px და შიგნით რამდენიმე ელემენტი.

ელემენტებს აქვს დიდი flex-basis (მაგ: 300px) თითოეულს

გააკეთე ისე, რომ:

ელემენტები არ შემცირდნენ საერთოდ ანუ არ შეიკუმშნონ
და გადავიდნენ ახალ ხაზზე ეკრანის შემიცირებასთან ერთად -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
    <style>
        .flex-container {
            display: flex;
            flex-wrap: wrap;
            width: 400px;
        }

        .item {
            flex-basis: 300px;
            flex-shrink: 0;
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="flex-container">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
    </div>
</body>
</html>
