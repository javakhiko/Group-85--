<!-- 9)გაქვს 4 ელემენტი ერთ რიგში.

მოაწყე ისე, რომ:

პირველი იყოს 100px
მეორე — 200px
მესამე — 300px
მეოთხე — 150px

გამოიყენე flex-basis თითოეულზე -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flex-container {
            display: flex;
        }

        .item-1 {
            flex-basis: 100px;
        }

        .item-2 {
            flex-basis: 200px;
        }

        .item-3 {
            flex-basis: 300px;
        }

        .item-4 {
            flex-basis: 150px;
        }
    </style>
</head>
<body>
    <div class="flex-container">
        <div class="item-1">Item 1</div>
        <div class="item-2">Item 2</div>
        <div class="item-3">Item 3</div>
        <div class="item-4">Item 4</div>
    </div>
</body>
</html>
