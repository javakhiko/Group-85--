<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 7)შექმენით 5 ღილაკი,მიეცით 5 ივეს ბორდერები

    <button style="border: 1px solid green; padding: 900px; ">click</button>
    <button style="border: 1px solid green; padding: 90px; ">click</button>
    <button style="border: 1px solid green; padding: 50px; ">click</button>
    <button style="border: 1px solid green; padding: 5px; ">click</button>
    <button style="border: 1px solid green; padding: 100px; ">click</button>
</body>
</html>
