<!-- 1)შექმენი დივი

ფერი მწვანე , სიგანე სიმაღლე 300px , ბორდერი 1პხ წითელი ფერის

შენი დავალებაა hover ზე მისცე დივს შემდეგი სტილები

ფერი გახდეს ყვითელი 2s ში

border გაუსქელდეს და გახდეს 5პხ ლურჯი ფერის 5s ში

მოუმრგვალდეს კუთხეები 20პხ ით 3s ში

სიგანე გახდეს 400px 6s ში

სიმაღლე გახდეს 350პხ 3s ში

ჩამოვიდეს ქვემოთ(translateY) 100px ით 7s ში

სიჩქარე იყოს constant(linear) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
        width: 300px;
        height: 300px;
        background-color: green;
        border: 1px solid red;
        transition: background-color 2s linear,border 5s linear,border-radius 3s linear,width 6s linear,height 3s linear,transform 7s linear;
        }
        
        div:hover {
        background-color: yellow;
        border: 5px solid blue;
        border-radius: 20px;
        width: 400px;
        height: 350px;
        transform: translateY(100px);
        }
    </style>
</head>
<body>
    <div>

    </div>
</body>
</html>
