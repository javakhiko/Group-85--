<!-- 5)შექმენი navbar-ის ლინკები, სადაც hover-ზე:
ტექსტის ფერი შეიცვალოს1.2s
underline effect გამოჩნდეს 1s
ტექსტი გაიზარდოს 0.3s -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            padding: 0;
        }
        div{
            display: flex;
            justify-content: space-evenly;
            border: black solid 5px;
            width: 100%;
            height: 100px;
            align-items: center;
            gap: 100px;
            
        }
        a{
            text-decoration: none;
            transition: color 1.2s ease, text-decoration 1s ease, transform 0.3s ease;
        }
        a:hover{
            text-decoration: underline;
            color: red;
            transform: scale(2);
        }
    </style>
</head>
<body>
    <div>
        <a href="">facebook</a>
        <a href="">twitter</a>
        <a href="">instagram</a>
        <a href="">youtube</a>
    </div>
</body>
</html>
