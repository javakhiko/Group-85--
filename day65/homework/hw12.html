<!-- 12)შექმენი box, რომელიც hover-ზე:
translateX(50px)-ით მარჯვნივ გადავა
background-color შეიცვლის 
all 2s -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: red;
            width: 300px;
            height: 300px;
            transition: all 2s ease;
        }
        div:hover{
            transform: translateX(50px);
            background-color: blue;
        }
    </style>
</head>
<body>
    <div>

    </div>
</body>
</html>
