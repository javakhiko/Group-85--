<!-- 15)ექმენი ფოტო, რომელსაც hover-ზე:
scale(1.1) და rotate(30deg) ერთად ქონდეს 
all 1.5s -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            transition: all 1.5s ease;
        }
        img:hover{
            transform: scale(1.1) rotate(30deg);
        }
    </style>
</head>
<body>
    <img src="https://www.hollywoodreporter.com/wp-content/uploads/2012/12/img_logo_blue.jpg?w=1440&h=810&crop=1" alt="" width="300px" height="300px">
</body>
</html>
