<!-- 11)შექმენი ფოტო (img), რომელსაც hover-ზე:
rotate(15deg) გაეკეთოს
opacity შემცირდეს
transition :all 3s -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img:hover{
            transform: rotate(15deg);
            opacity: 2%;
            transition: all 3s ease;
        }
    </style>
</head>
<body>
    <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_640.png" alt="" width="300px" height="auto">
</body>
</html>
