<!-- 13)შექმენი ღილაკი (button), რომელსაც :active დროს:
scale(0.9) გაუკეთდება
rotate მოხდება 45deg
delay 2s
duration all 4s -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            transition: all 4s ease 2s;
        }
        button:active{
            transform: scale(0.9) rotate(45deg);
        }
    </style>
</head>
<body>
    <button>click</button>
</body>
</html>
