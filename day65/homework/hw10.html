<!-- 9)შექმენი profile card:
hover-ზე ფოტო rotateდეს 0.8s
სახელი ფერში შეიცვალოს 0.3s
card აიწიოს 0.5s
ჩრდილი დაემატოს 1s
shadow effect დაიწყოს 0.2s delay-ით -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .profile-card {
            width: 300px;
            padding: 20px;
            border-radius: 15px;
            background-color: #f4f4f4;
            text-align: center;
            transition: transform 0.5s ease, box-shadow 1s ease 0.2s;
        }

        .image-container img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            transition: transform 0.8s ease;
        }

        .name {
            margin-top: 15px;
            color: #333;
            transition: color 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .profile-card:hover .image-container img {
            transform: rotate(360deg);
        }

        .profile-card:hover .name {
            color: #ff4757;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="image-container">
            <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_640.png" alt="Profile Picture">
        </div>
        <h2 class="name">გიორგი ბერიძე</h2>
        <p class="title">Front-End Developer</p>
    </div>
</body>
</html>
