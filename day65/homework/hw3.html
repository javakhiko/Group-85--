<!-- 3)შექმენი card, რომელსაც hover-ზე:
translateY(-20px) შესრულდეს 0.4s
box-shadow დაემატოს 0.8s
scale გაიზარდოს 0.5s -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            background-color: #3498db;
            transition: translateY  0.4s , box-shadow 0.8s , scale 0.5s  ease-in-out; 
        }

        div:hover {
            background-color: #e74c3c;
            transform: translateY(-20px) scale(2);
            box-shadow: 0px 10px 10px green;
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
