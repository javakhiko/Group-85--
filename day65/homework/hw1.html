<!-- 1)შექმენი div, რომელსაც hover-ზე:
background-color შეიცვლება 0.3 წამში 
ზომა გაიზრდება 0.6 წამში 
rotate მოხდება 1 წამში 
delay ქონდეს 3s -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            background-color: #3498db;
            transition: background-color 0.3s, transform 0.6s ease; 
            transition-delay:  3s;
        }

        div:hover {
            background-color: #e74c3c;
            transform: scale(1.5) rotate(45deg);
            
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
