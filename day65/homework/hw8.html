<!-- 8)შექმენი animated button:
scale გაიზარდოს 0.3s
box-shadow გაფართოვდეს 0.7s
ტექსტის ფერი შეიცვალოს 0.2s
shadow effect დაიწყოს 0.1s delay-ით -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button:hover{
            transform: scale(2);
            box-shadow: 0px 10px green 5px;

        }
        button{
            width: 100px;
            height: 100px;
            
        }
    </style>
</head>
<body>  
    <button></button>
</body>
</html>
