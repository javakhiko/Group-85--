<!-- 14)შექმენი card, რომელსაც hover-ზე:
translateY(-20px)-ით ზემოთ აიწევს
ჩრდილი დაემატება 
all 2s -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 300px;
            height: 300px;
            background-color: red;
            transition: all 2s ease;
        }
        div:hover{
            transform: translateY(-20px);
            box-shadow: 0px 0px 5px green;
        }
    </style>
</head>
<body>
    <div>

    </div>
</body>
</html>
