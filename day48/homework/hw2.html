<!-- 2)გამოიყენე წინა დავალებაში შექმნილი მშოვბელი

დავალება:

დააყენე flex-direction: row

შემდეგ შეცვალე flex-direction: column

აღწერე რა განსხვავებაა ამ ორ კუთვნილებას შორის კომენტარით -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: red;
            margin: 10px;
        }
        body {
            display: flex;
            /* flex-direction: row; */
            flex-direction: column;
        }
        /* row - ელემენტები განლაგებულია ჰორიზონტალურად, ხოლო column - ვერტიკალურად. */
    </style>
</head>
<body>
    <div>
        <div></div>
    </div>
</body>
</html>
