<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Results Summary</title>
</head>
<body>
  <main class="container">
    <section class="result-side">
      <h2>Your Result</h2>
      <div class="score-circle">
        <h1>76</h1>
        <p>of 100</p>
      </div>
      <h3>Great</h3>
      <p class="description">You scored higher than 65% of the people who have taken these tests.</p>
    </section>

    <section class="summary-side">
      <h2>Summary</h2>
      <div class="summary-list">
        <div class="summary-item reaction">
          <span>Reaction</span>
          <span class="score"><strong>80</strong> / 100</span>
        </div>
        <div class="summary-item memory">
          <span>Memory</span>
          <span class="score"><strong>92</strong> / 100</span>
        </div>
        <div class="summary-item verbal">
          <span>Verbal</span>
          <span class="score"><strong>61</strong> / 100</span>
        </div>
        <div class="summary-item visual">
          <span>Visual</span>
          <span class="score"><strong>72</strong> / 100</span>
        </div>
      </div>
      <button>Continue</button>
    </section>
  </main>
</body>
</html>
